# Claude Kakao Notify — NAS notify-api (multi-tenant 2.0)
#
# 사용법:
#   1. cp .env.example .env  &&  편집 (멀티테넌트는 NOTIFY_API_KEY 불필요)
#   2. data 디렉터리 준비 (멀티테넌트: tools/add_tenant.py 로 테넌트 추가
#      / 레거시: kakao_config.json + kakao_token.json 직접 배치)
#   3. docker compose up -d --build
#   4. curl http://localhost:8002/health

services:
  notify-api:
    build: .
    image: notify-api:2.0
    container_name: notify-api
    restart: always

    # 토큰 파일 atomic replace 시 호스트 소유권 보존을 위해 호스트 uid:gid 로 실행
    # Synology 기본: 1026 (parkbohyun) : 100 (users) — 환경에 맞게 .env 에서 조정
    user: "${RUN_UID:-1026}:${RUN_GID:-100}"

    ports:
      - "${HOST_PORT:-8002}:8000"

    volumes:
      # 카카오 config/token 위치. 기본 ./data (compose 파일 옆 디렉터리).
      # 기존 /volume1/docker/scripts/ 등을 공유 사용 중이면 .env 에서 DATA_DIR 절대경로 지정.
      - "${DATA_DIR:-./data}:/data"

    environment:
      # 멀티테넌트 모드 (data/tenants.json 존재) 에서는 무시됨.
      # 레거시 모드 (data/tenants.json 부재) 에서만 사용.
      NOTIFY_API_KEY: "${NOTIFY_API_KEY:-}"
