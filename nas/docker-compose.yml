# Claude Kakao Notify — NAS notify-api
#
# 사용법:
#   1. cp .env.example .env  &&  편집하여 NOTIFY_API_KEY 등 채우기
#   2. data 디렉터리에 kakao_config.json + kakao_token.json 배치
#      (tools/get_initial_token.py 로 생성 가능)
#   3. docker compose up -d --build
#   4. curl http://localhost:8002/health   →   {"ok":true,"config":true,"token":true}

services:
  notify-api:
    build: .
    image: notify-api:1.0
    container_name: notify-api
    restart: always

    # 토큰 파일 atomic replace 시 호스트 소유권 보존을 위해 호스트 uid:gid 로 실행
    # Synology 기본: 1026 (parkbohyun) : 100 (users) — 환경에 맞게 .env 에서 조정
    user: "${RUN_UID:-1026}:${RUN_GID:-100}"

    ports:
      - "${HOST_PORT:-8002}:8000"

    volumes:
      # 카카오 config/token 파일 위치. 기본은 ./data (compose 파일 옆 디렉터리).
      # 기존에 /volume1/docker/scripts/ 등을 공유 사용 중이면 .env 에서 DATA_DIR 지정.
      - "${DATA_DIR:-./data}:/data"

    environment:
      NOTIFY_API_KEY: "${NOTIFY_API_KEY:?NOTIFY_API_KEY 가 .env 에 정의되지 않았습니다}"
